name: music_app
description: A modern music streaming mobile app.

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  cupertino_icons: ^1.0.2
  palette_generator: ^0.3.3
  cached_network_image: ^3.3.1
  flutter_animate: ^4.2.0
  youtube_explode_dart: ^2.1.2
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  url_launcher: ^6.2.4
  youtube_player_iframe: any
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
